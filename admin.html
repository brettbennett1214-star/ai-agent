<!DOCTYPE html>
<html>
<head>
  <title>AI Agent Admin</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    pre {
      background: black;
      color: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="card">

<h1>Train AI From Website</h1>

<input id="clientId" placeholder="Client ID (example: bright-smile-dental)" />

<input id="websiteUrl" placeholder="Website URL (example: https://example.com)" />

<button id="trainBtn">Train From Website</button>

<h2>Result</h2>

<pre id="resultBox">Waiting...</pre>

</div>

<script>

const API = "https://ai-agent-production-5fa8.up.railway.app";

const trainBtn = document.getElementById("trainBtn");
const clientId = document.getElementById("clientId");
const websiteUrl = document.getElementById("websiteUrl");
const resultBox = document.getElementById("resultBox");

trainBtn.onclick = async () => {

  const client = clientId.value.trim();
  const url = websiteUrl.value.trim();

  if(!client){
    resultBox.textContent = "Enter a client id first";
    return;
  }

  if(!url){
    resultBox.textContent = "Enter a website url";
    return;
  }

  resultBox.textContent = "Training...";

  try{

    const response = await fetch(API + "/train-from-website",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        clientId:client,
        url:url
      })
    });

    const data = await response.json();

    resultBox.textContent = JSON.stringify(data,null,2);

  }catch(e){

    resultBox.textContent = "Error: " + e.message;

  }

}

</script>

</body>
</html>
